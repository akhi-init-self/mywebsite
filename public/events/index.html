<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stadtprogramm Ludwigsburg 🎉</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <style>
    /* ── THEME TOKENS ───────────────────────────────────── */
    :root {
      /* Light theme */
      --bg:          #fff9f0;
      --bg2:         #fff3e0;
      --surface:     #ffffff;
      --surface2:    #fff8f0;
      --border:      #ffe0b2;
      --text:        #1a0f00;
      --text2:       #6b4c2a;
      --text3:       #a07850;

      --sun:         #ff6b35;
      --sunl:        #ff9a6c;
      --yellow:      #ffca28;
      --yellowl:     #fff176;
      --teal:        #00bfa5;
      --teall:       #64dfcf;
      --purple:      #7c4dff;
      --purplel:     #b388ff;
      --pink:        #f50057;
      --green:       #00c853;

      --shadow-sm:   0 2px 8px rgba(255,107,53,.10);
      --shadow-md:   0 6px 24px rgba(255,107,53,.15);
      --shadow-lg:   0 16px 48px rgba(255,107,53,.20);
      --radius-sm:   10px;
      --radius-md:   18px;
      --radius-lg:   28px;
    }

    [data-theme="dark"] {
      --bg:          #120d07;
      --bg2:         #1e1408;
      --surface:     #261a0d;
      --surface2:    #2e2010;
      --border:      #3d2a14;
      --text:        #fff8f0;
      --text2:       #c89a6a;
      --text3:       #8a6040;

      --sun:         #ff7d4d;
      --sunl:        #ffaa80;
      --yellow:      #ffd740;
      --yellowl:     #ffe57f;
      --teal:        #1de9b6;
      --teall:       #64ffda;
      --purple:      #9c6fff;
      --purplel:     #c5a3ff;
      --pink:        #ff4081;
      --green:       #69f0ae;

      --shadow-sm:   0 2px 8px rgba(0,0,0,.3);
      --shadow-md:   0 6px 24px rgba(0,0,0,.4);
      --shadow-lg:   0 16px 48px rgba(0,0,0,.5);
    }

    /* ── RESET ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background .3s, color .3s;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      background: var(--sun);
      padding: 2.5rem 1.5rem 3rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Decorative blobs */
    header::before, header::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      opacity: .18;
    }
    header::before {
      width: 320px; height: 320px;
      background: var(--yellow);
      top: -80px; left: -60px;
    }
    header::after {
      width: 240px; height: 240px;
      background: var(--pink);
      bottom: -60px; right: -40px;
    }

    .header-inner {
      position: relative;
      z-index: 1;
    }

    /* Theme toggle */
    .theme-toggle {
      position: absolute;
      top: 1.2rem;
      right: 1.2rem;
      z-index: 10;
      background: rgba(255,255,255,.22);
      border: 2px solid rgba(255,255,255,.4);
      border-radius: 100px;
      padding: .35rem .7rem;
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      transition: background .2s, transform .15s;
      display: flex;
      align-items: center;
      gap: .3rem;
    }
    .theme-toggle:hover { background: rgba(255,255,255,.35); transform: scale(1.08); }
    .theme-toggle .icon-dark { display: none; }
    [data-theme="dark"] .theme-toggle .icon-light { display: none; }
    [data-theme="dark"] .theme-toggle .icon-dark  { display: inline; }

    header h1 {
      font-family: 'Baloo 2', cursive;
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -.01em;
      line-height: 1.1;
      text-shadow: 0 3px 0 rgba(0,0,0,.12);
    }

    header p {
      margin-top: .6rem;
      color: rgba(255,255,255,.88);
      font-size: 1rem;
      font-weight: 600;
    }

    .header-badges {
      display: flex;
      gap: .6rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1.2rem;
    }
    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      background: rgba(255,255,255,.22);
      color: #fff;
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      padding: .35em 1em;
      border-radius: 100px;
      border: 2px solid rgba(255,255,255,.3);
      backdrop-filter: blur(4px);
    }

    /* Wavy divider */
    .wave {
      display: block;
      width: 100%;
      margin-top: -2px;
      line-height: 0;
    }
    .wave svg {
      display: block;
      width: 100%;
    }

    /* ── FILTER BAR ─────────────────────────────────────── */
    .filters-wrap {
      background: var(--bg2);
      border-bottom: 2px solid var(--border);
      padding: 1rem 1.5rem 1.2rem;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: var(--shadow-sm);
      transition: background .3s, border-color .3s;
    }

    .filters {
      max-width: 1160px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: .6rem;
      align-items: flex-end;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: .2rem;
      flex: 1 1 130px;
    }

    .filter-group label {
      font-size: .68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text3);
    }

    .filter-group input,
    .filter-group select {
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      padding: .45rem .7rem;
      font-family: 'Nunito', sans-serif;
      font-size: .86rem;
      font-weight: 600;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color .18s, box-shadow .18s, background .3s;
      width: 100%;
    }
    .filter-group input:focus,
    .filter-group select:focus {
      border-color: var(--sun);
      box-shadow: 0 0 0 3px rgba(255,107,53,.15);
    }

    .btn-reset {
      padding: .5rem 1.1rem;
      border-radius: var(--radius-sm);
      border: 2px solid var(--pink);
      background: transparent;
      color: var(--pink);
      font-family: 'Nunito', sans-serif;
      font-size: .85rem;
      font-weight: 800;
      cursor: pointer;
      transition: all .18s;
      align-self: flex-end;
      white-space: nowrap;
    }
    .btn-reset:hover { background: var(--pink); color: white; transform: scale(1.04); }

    .result-count {
      align-self: flex-end;
      font-size: .8rem;
      font-weight: 700;
      color: var(--text3);
      white-space: nowrap;
      padding-bottom: .3rem;
    }

    /* ── SEARCH ─────────────────────────────────────────── */
    .search-wrap {
      max-width: 1160px;
      margin: 1.2rem auto .2rem;
      padding: 0 1.5rem;
    }
    .search-box {
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: .75rem 1.1rem .75rem 3rem;
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color .18s, box-shadow .18s, background .3s;
    }
    .search-box input:focus {
      border-color: var(--sun);
      box-shadow: 0 0 0 4px rgba(255,107,53,.12);
    }
    .search-box input::placeholder { color: var(--text3); font-weight: 600; }
    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      pointer-events: none;
    }

    /* ── MAIN ───────────────────────────────────────────── */
    main {
      max-width: 1160px;
      margin: 0 auto;
      padding: 1rem 1.5rem 5rem;
    }

    /* ── CARDS GRID ─────────────────────────────────────── */
    #event-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.2rem;
    }

    /* Card accent color palette — cycles through 5 colors */
    .event-card { --accent: var(--sun); }
    .event-card:nth-child(5n+1) { --accent: var(--sun);    }
    .event-card:nth-child(5n+2) { --accent: var(--teal);   }
    .event-card:nth-child(5n+3) { --accent: var(--purple);  }
    .event-card:nth-child(5n+4) { --accent: var(--yellow);  }
    .event-card:nth-child(5n+5) { --accent: var(--pink);    }

    .event-card {
      background: var(--surface);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform .22s cubic-bezier(.34,1.56,.64,1), box-shadow .22s;
      border: 2px solid var(--border);
      animation: popIn .4s cubic-bezier(.34,1.56,.64,1) both;
    }
    .event-card:hover {
      transform: translateY(-5px) rotate(.4deg);
      box-shadow: var(--shadow-lg);
      border-color: var(--accent);
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(.88) translateY(16px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .card-top {
      height: 7px;
      background: var(--accent);
      border-radius: var(--radius-md) var(--radius-md) 0 0;
      position: relative;
      overflow: hidden;
    }
    .card-top::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.3) 50%, transparent 100%);
      transform: translateX(-100%);
      transition: transform .5s;
    }
    .event-card:hover .card-top::after { transform: translateX(100%); }

    .card-body { padding: 1.1rem 1.2rem .9rem; flex: 1; }

    .card-meta {
      display: flex;
      gap: .4rem;
      flex-wrap: wrap;
      margin-bottom: .6rem;
    }

    .tag {
      font-size: .65rem;
      font-weight: 800;
      letter-spacing: .04em;
      text-transform: uppercase;
      padding: .22em .7em;
      border-radius: 100px;
      background: var(--bg2);
      color: var(--text2);
      border: 1.5px solid var(--border);
      transition: background .2s;
    }
    .tag.age {
      background: #e8f8f5;
      color: #007a6e;
      border-color: #a5e8e0;
    }
    [data-theme="dark"] .tag.age {
      background: #0d3330;
      color: var(--teall);
      border-color: #1a5a55;
    }
    .tag.venue {
      background: #fff3e0;
      color: #bf6000;
      border-color: #ffcc80;
    }
    [data-theme="dark"] .tag.venue {
      background: #2e1f00;
      color: var(--yellowl);
      border-color: #5a3d00;
    }
    .tag.source {
      background: #f3eeff;
      color: #5a3db0;
      border-color: #d1b8ff;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 700;
    }
    [data-theme="dark"] .tag.source {
      background: #1e1030;
      color: var(--purplel);
      border-color: #3d2060;
    }

    .card-title {
      font-family: 'Baloo 2', cursive;
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
      margin-bottom: .25rem;
    }
    .card-subtitle {
      font-size: .82rem;
      font-weight: 600;
      color: var(--text3);
      font-style: italic;
      margin-bottom: .6rem;
    }

    .card-info {
      display: flex;
      flex-direction: column;
      gap: .18rem;
      font-size: .82rem;
      font-weight: 600;
      color: var(--text2);
    }
    .card-info span { display: flex; align-items: center; gap: .4rem; }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .7rem 1.2rem;
      border-top: 2px solid var(--border);
      background: var(--surface2);
      transition: background .3s;
    }
    .price-badge {
      font-family: 'Baloo 2', cursive;
      font-size: .95rem;
      font-weight: 700;
      color: var(--sun);
    }
    .btn-details {
      padding: .38rem 1rem;
      border-radius: 100px;
      background: var(--accent);
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: .78rem;
      font-weight: 800;
      border: none;
      cursor: pointer;
      transition: transform .15s cubic-bezier(.34,1.56,.64,1), filter .15s;
      letter-spacing: .02em;
      text-shadow: 0 1px 0 rgba(0,0,0,.12);
    }
    .btn-details:hover { transform: scale(1.1); filter: brightness(1.1); }

    /* ── EMPTY STATE ────────────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text3);
    }
    .empty-state .big { font-size: 4rem; margin-bottom: .5rem; animation: wiggle 1.5s ease-in-out infinite; }
    .empty-state p { font-size: 1.05rem; font-weight: 700; }

    @keyframes wiggle {
      0%,100% { transform: rotate(-8deg); }
      50%      { transform: rotate(8deg); }
    }

    /* ── LOADING ────────────────────────────────────────── */
    #loading {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text2);
      font-size: 1rem;
      font-weight: 700;
    }
    .spinner-wrap { display: flex; gap: .5rem; justify-content: center; margin-bottom: 1.2rem; }
    .dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      animation: bounce .8s ease-in-out infinite;
    }
    .dot:nth-child(1) { background: var(--sun);    animation-delay: 0s; }
    .dot:nth-child(2) { background: var(--teal);   animation-delay: .15s; }
    .dot:nth-child(3) { background: var(--purple);  animation-delay: .3s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-14px); }
    }

    /* ── MODAL ──────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(6px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border-radius: var(--radius-lg);
      max-width: 640px;
      width: 100%;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-lg);
      border: 2px solid var(--border);
      transform: scale(.92) translateY(20px);
      transition: transform .28s cubic-bezier(.34,1.56,.64,1), background .3s, border-color .3s;
    }
    .modal-overlay.open .modal { transform: scale(1) translateY(0); }

    .modal-header {
      background: var(--sun);
      padding: 1.4rem 1.5rem 1.2rem;
      border-radius: calc(var(--radius-lg) - 2px) calc(var(--radius-lg) - 2px) 0 0;
      position: relative;
      overflow: hidden;
    }
    .modal-header::before {
      content: '';
      position: absolute;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,.1);
      top: -60px; right: -40px;
    }
    .modal-header h2 {
      font-family: 'Baloo 2', cursive;
      font-size: 1.3rem;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.3;
      padding-right: 2.5rem;
      text-shadow: 0 2px 0 rgba(0,0,0,.1);
      position: relative;
    }
    .modal-header p {
      font-size: .85rem;
      font-weight: 600;
      color: rgba(255,255,255,.85);
      margin-top: .3rem;
      font-style: italic;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 1rem; right: 1rem;
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.4);
      background: rgba(255,255,255,.18);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .15s;
      font-weight: 800;
    }
    .modal-close:hover { background: rgba(255,255,255,.35); transform: scale(1.12) rotate(90deg); }

    .modal-body {
      padding: 1.4rem 1.5rem;
      overflow-y: auto;
      flex: 1;
    }
    .modal-meta {
      display: flex;
      flex-wrap: wrap;
      gap: .45rem;
      margin-bottom: 1.2rem;
    }
    .modal-detail-text {
      font-size: .88rem;
      font-weight: 600;
      line-height: 1.8;
      color: var(--text2);
      white-space: pre-wrap;
      border-top: 2px dashed var(--border);
      padding-top: 1rem;
      transition: color .3s;
    }
    .modal-footer {
      padding: 1rem 1.5rem;
      border-top: 2px solid var(--border);
      display: flex;
      gap: .75rem;
      flex-wrap: wrap;
      transition: border-color .3s;
    }
    .btn-link {
      flex: 1;
      padding: .65rem 1.2rem;
      border-radius: 100px;
      background: var(--sun);
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: .88rem;
      font-weight: 800;
      border: none;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: filter .18s, transform .15s;
      text-shadow: 0 1px 0 rgba(0,0,0,.12);
    }
    .btn-link:hover { filter: brightness(1.1); transform: scale(1.03); }

    /* ── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 640px) {
      .filters { gap: .45rem; }
      .filter-group { flex-basis: calc(50% - .225rem); }
      #event-list { grid-template-columns: 1fr; }
      header { padding: 2rem 1rem 2.4rem; }
    }
  </style>
</head>
<body>

<!-- THEME TOGGLE -->
<button class="theme-toggle" id="theme-toggle" aria-label="Theme wechseln">
  <span class="icon-light">🌙</span>
  <span class="icon-dark">☀️</span>
</button>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <h1>🎉 Stadtprogramm</h1>
    <p>Kurse · Workshops · Veranstaltungen in Ludwigsburg</p>
    <div class="header-badges">
      <span class="header-badge">🎨 Kunst &amp; Kreativität</span>
      <span class="header-badge">🏃 Sport &amp; Bewegung</span>
      <span class="header-badge">🎭 Theater &amp; Mehr</span>
    </div>
  </div>
</header>

<!-- WAVE DIVIDER -->
<div class="wave">
  <svg viewBox="0 0 1440 40" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path id="wave-path" d="M0,20 C360,40 1080,0 1440,20 L1440,40 L0,40 Z" />
  </svg>
</div>

<!-- FILTERS -->
<div class="filters-wrap">
  <div class="filters">
    <div class="filter-group">
      <label>📅 Von</label>
      <input type="date" id="filter-date-from" />
    </div>
    <div class="filter-group">
      <label>📅 Bis</label>
      <input type="date" id="filter-date-to" />
    </div>
    <div class="filter-group">
      <label>👶 Altersgruppe</label>
      <select id="filter-age">
        <option value="">Alle Altersgruppen</option>
        <option value="ab 4 Jahren">Ab 4 Jahren</option>
        <option value="ab 6 Jahren">Ab 6 Jahren</option>
        <option value="ab 8 Jahren">Ab 8 Jahren</option>
        <option value="ab 10 Jahren">Ab 10 Jahren</option>
        <option value="ab 12 Jahren">Ab 12 Jahren</option>
        <option value="Erwachsene">Für Erwachsene</option>
        <option value="Kinder und Erwachsene">Kinder &amp; Erwachsene</option>
      </select>
    </div>
    <div class="filter-group">
      <label>📍 Veranstaltungsort</label>
      <select id="filter-venue">
        <option value="">Alle Orte</option>
      </select>
    </div>
    <div class="filter-group">
      <label>🏷️ Kategorie</label>
      <select id="filter-category">
        <option value="">Alle Kategorien</option>
      </select>
    </div>
    <div class="filter-group">
      <label>🌐 Quelle</label>
      <select id="filter-source">
        <option value="">Alle Quellen</option>
      </select>
    </div>
    <button class="btn-reset" id="btn-reset">✕ Reset</button>
    <span class="result-count" id="result-count"></span>
  </div>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Suche nach Titel, Ort, Kursleiter …" />
  </div>
</div>

<!-- MAIN -->
<main>
  <div id="loading">
    <div class="spinner-wrap">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    Veranstaltungen werden geladen…
  </div>
  <div id="event-list"></div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <button class="modal-close" id="modal-close" aria-label="Schließen">✕</button>
      <h2 id="modal-title"></h2>
      <p id="modal-subtitle"></p>
    </div>
    <div class="modal-body">
      <div class="modal-meta" id="modal-meta"></div>
      <div class="modal-detail-text" id="modal-detail"></div>
    </div>
    <div class="modal-footer">
      <a class="btn-link" id="modal-link" href="#" target="_blank" rel="noopener">
        🔗 Zur offiziellen Seite
      </a>
    </div>
  </div>
</div>

<script>
// ── Theme toggle ───────────────────────────────────────────
(function() {
  const saved = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  // Sync wave fill color on load
  updateWave(saved);
})();

function updateWave(theme) {
  const path = document.getElementById('wave-path');
  if (!path) return;
  // Wave fill matches bg color so it blends
  const fill = theme === 'dark' ? '#120d07' : '#fff9f0';
  path.parentElement.style.background = 'var(--sun)';
  path.setAttribute('fill', fill);
}

document.getElementById('theme-toggle').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  updateWave(next);
});

// ── Helpers ────────────────────────────────────────────────
function parseGermanDate(str) {
  if (!str || str === '–' || str === '-') return null;
  // DD.MM.YYYY
  const dmy = str.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})/);
  if (dmy) return new Date(+dmy[3], +dmy[2] - 1, +dmy[1]);
  // "Di 19. Mai 2026"
  const months = {
    'Jan':0,'Feb':1,'Mär':2,'Mar':2,'Apr':3,'Mai':4,'Jun':5,
    'Jul':6,'Aug':7,'Sep':8,'Okt':9,'Nov':10,'Dez':11
  };
  const m = str.match(/(\d+)\.\s+(\w+)\s+(\d{4})/);
  if (!m) return null;
  const mon = months[m[2].substring(0,3)];
  if (mon === undefined) return null;
  return new Date(+m[3], mon, +m[1]);
}

function formatDate(str) {
  const d = parseGermanDate(str);
  if (!d) return str || '';
  return d.toLocaleDateString('de-DE', {weekday:'short', day:'numeric', month:'long', year:'numeric'});
}

function decodeHtml(str) {
  if (!str) return '';
  return str.replace(/&amp;/g, '&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
}

function extractAgeTag(categories) {
  return categories.find(c => c.includes('Jahren') || c.includes('Erwachsene') || c.includes('Kinder und')) || null;
}

function cardAnim(i) {
  return `animation-delay:${Math.min(i * 35, 420)}ms`;
}

// ── State ──────────────────────────────────────────────────
let allEvents = [];

// ── Render ─────────────────────────────────────────────────
function renderEvents(events) {
  const list = document.getElementById('event-list');
  const total = allEvents.length;
  const shown = events.length;
  document.getElementById('result-count').textContent =
    shown === total ? `${shown} Veranstaltungen` : `${shown} von ${total}`;

  if (!shown) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="big">🤷</div>
        <p>Keine Veranstaltungen gefunden.<br>Bitte Filter anpassen!</p>
      </div>`;
    return;
  }

  list.innerHTML = events.map((ev, i) => {
    const cats = (ev.Categories || '').split(',').map(c => decodeHtml(c.trim())).filter(Boolean);
    const ageTag = extractAgeTag(cats);
    const otherCats = cats
      .filter(c => !c.includes('Jahren') && !c.includes('Erwachsene')
                && !c.startsWith('für Kinder und') && !c.startsWith('Workshops_')
                && !c.startsWith('alle '))
      .slice(0, 2);
    const venue = decodeHtml(ev.Venue);
    const dateEnd = ev.Date_End && ev.Date_End !== ev.Date_Start
                 && ev.Date_End !== '–' && ev.Date_End !== '-';

    return `
    <div class="event-card" style="${cardAnim(i)}">
      <div class="card-top"></div>
      <div class="card-body">
        <div class="card-meta">
          ${ageTag ? `<span class="tag age">👶 ${ageTag}</span>` : ''}
          ${otherCats.map(c => `<span class="tag">${c}</span>`).join('')}
          ${venue ? `<span class="tag venue">📍 ${venue}</span>` : ''}
        </div>
        <div class="card-title">${decodeHtml(ev.Title)}</div>
        ${ev.Subtitle ? `<div class="card-subtitle">${decodeHtml(ev.Subtitle)}</div>` : ''}
        <div class="card-info">
          <span>📅 ${formatDate(ev.Date_Start)}${dateEnd ? ' – ' + formatDate(ev.Date_End) : ''}</span>
          ${ev.Time && ev.Time !== '–' ? `<span>🕐 ${ev.Time}</span>` : ''}
          ${ev.Course_Nr ? `<span>🎓 Kurs-Nr: ${ev.Course_Nr}</span>` : ''}
        </div>
      </div>
      <div class="card-footer">
        <span class="price-badge">${decodeHtml(ev.Price) || '✨ Kostenlos'}</span>
        <button class="btn-details" data-file="${ev.detail_file}" data-idx="${i}">Details →</button>
      </div>
    </div>`;
  }).join('');

  list.querySelectorAll('.btn-details').forEach(btn => {
    btn.addEventListener('click', () => openModal(events[+btn.dataset.idx], btn.dataset.file));
  });
}

// ── Filters ────────────────────────────────────────────────
function applyFilters() {
  const from   = document.getElementById('filter-date-from').value;
  const to     = document.getElementById('filter-date-to').value;
  const age    = document.getElementById('filter-age').value;
  const venue  = document.getElementById('filter-venue').value;
  const cat    = document.getElementById('filter-category').value;
  const source = document.getElementById('filter-source').value;
  const search = document.getElementById('search-input').value.toLowerCase().trim();

  const fromDate = from ? new Date(from) : null;
  const toDate   = to   ? new Date(to)   : null;

  const filtered = allEvents.filter(ev => {
    const evDate = parseGermanDate(ev.Date_Start);
    if (fromDate && evDate && evDate < fromDate) return false;
    if (toDate   && evDate && evDate > toDate)   return false;
    if (age    && !(ev.Categories || '').toLowerCase().includes(age.toLowerCase())) return false;
    if (venue  && decodeHtml(ev.Venue) !== venue) return false;
    if (cat    && !(ev.Categories || '').includes(cat)) return false;
    if (source && ev.Source !== source) return false;
    if (search) {
      const hay = [ev.Title, ev.Subtitle, ev.Venue, ev.Categories, ev.Course_Nr, ev.Source].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  renderEvents(filtered);
}

// ── Modal ──────────────────────────────────────────────────
function openModal(ev, detailFile) {
  document.getElementById('modal-title').textContent    = decodeHtml(ev.Title);
  document.getElementById('modal-subtitle').textContent = decodeHtml(ev.Subtitle || '');
  document.getElementById('modal-link').href            = ev.Link || '#';

  const cats   = (ev.Categories || '').split(',').map(c => decodeHtml(c.trim()));
  const ageTag = extractAgeTag(cats);
  document.getElementById('modal-meta').innerHTML = `
    ${ageTag ? `<span class="tag age">👶 ${ageTag}</span>` : ''}
    <span class="tag">📅 ${formatDate(ev.Date_Start)}</span>
    ${ev.Time && ev.Time !== '–' ? `<span class="tag">🕐 ${ev.Time}</span>` : ''}
    ${ev.Venue ? `<span class="tag venue">📍 ${decodeHtml(ev.Venue)}</span>` : ''}
    ${ev.Price ? `<span class="tag">💶 ${decodeHtml(ev.Price)}</span>` : ''}
    ${ev.Source ? `<span class="tag source">🌐 ${ev.Source}</span>` : ''}
  `;

  const detailEl = document.getElementById('modal-detail');
  detailEl.textContent = 'Beschreibung wird geladen…';
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  fetch(detailFile)
    .then(r => r.ok ? r.text() : Promise.reject(r.status))
    .then(text => {
      const parts = text.split(/={10,}/);
      detailEl.textContent = (parts[1] || parts[0]).trim();
    })
    .catch(() => { detailEl.textContent = 'Beschreibung konnte nicht geladen werden.'; });
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Populate dropdowns ─────────────────────────────────────
function populateDropdowns() {
  const venues = [...new Set(
    allEvents.map(e => decodeHtml(e.Venue)).filter(v => v && v !== '–' && v !== '-')
  )].sort();
  const venSel = document.getElementById('filter-venue');
  venues.forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; venSel.appendChild(o); });

  const excluded = ['Jahre','Erwachsene','Workshops_','alle Ferien'];
  const cats = [...new Set(
    allEvents.flatMap(e =>
      (e.Categories || '').split(',')
        .map(c => decodeHtml(c.trim()))
        .filter(c => c && c !== '–' && !excluded.some(x => c.includes(x)))
    )
  )].sort();
  const catSel = document.getElementById('filter-category');
  cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; catSel.appendChild(o); });

  const sources = [...new Set(allEvents.map(e => e.Source).filter(Boolean))].sort();
  const srcSel = document.getElementById('filter-source');
  sources.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; srcSel.appendChild(o); });
}

// ── Init ───────────────────────────────────────────────────
document.getElementById('btn-reset').addEventListener('click', () => {
  ['filter-date-from','filter-date-to','filter-age','filter-venue','filter-category','filter-source']
    .forEach(id => document.getElementById(id).value = '');
  document.getElementById('search-input').value = '';
  renderEvents(allEvents);
});

['filter-date-from','filter-date-to','filter-age','filter-venue','filter-category','filter-source']
  .forEach(id => document.getElementById(id).addEventListener('change', applyFilters));
document.getElementById('search-input').addEventListener('input', applyFilters);

Papa.parse('manifest.csv', {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete(results) {
    document.getElementById('loading').style.display = 'none';
    allEvents = results.data;
    populateDropdowns();
    renderEvents(allEvents);
  },
  error(err) {
    document.getElementById('loading').innerHTML =
      `<p style="color:var(--pink)">Fehler beim Laden: ${err.message}</p>`;
  }
});
</script>
</body>
</html>
