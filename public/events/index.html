<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kinderprogramm Ludwigsburg</title>
  
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <style>
    /* ── FUN & BRIGHT TOKENS (Soft Shadows) ─────────────────────────── */
    :root {
      --primary:    #6C5CE7; /* Playful Purple */
      --secondary:  #FF7675; /* Soft Coral / Red */
      --accent:     #FDCB6E; /* Sunny Yellow */
      --success:    #55E6C1; /* Mint Green */
      --sky:        #E0F2FE; /* Background Sky Blue */
      --ink:        #2D3436; /* Dark text for readability */
      --card-bg:    #ffffff;
      
      --radius-lg:  24px;
      --radius-md:  16px;
      
      /* Soft, modern shadows instead of chunky ones */
      --shadow:     0 8px 24px rgba(108, 92, 231, 0.12);
      --shadow-hover: 0 15px 35px rgba(108, 92, 231, 0.25);
    }

    /* ── RESET & BASE ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--sky);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER: VIBRANT & CURVED ────────────────────────── */
    header {
      background: linear-gradient(135deg, #6C5CE7 0%, #A29BFE 100%);
      padding: 4rem 1.5rem 5rem;
      text-align: center;
      color: white;
      position: relative;
      clip-path: ellipse(150% 100% at 50% 0%);
    }
    header h1 {
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 900;
      text-shadow: 2px 4px 0px rgba(0,0,0,0.1);
      margin-bottom: 0.5rem;
      letter-spacing: -0.5px;
    }
    header p {
      font-size: 1.25rem;
      font-weight: 600;
      opacity: 0.95;
    }
    .header-badge {
      display: inline-block;
      margin-top: 1.5rem;
      background: var(--accent);
      color: var(--ink);
      font-weight: 800;
      padding: 0.5rem 1.2rem;
      border-radius: 50px;
      box-shadow: 0 4px 15px rgba(253, 203, 110, 0.5);
    }

    /* ── MODERN FLOATING FILTERS ──────────────────────── */
    .filters-wrap {
      max-width: 1100px;
      margin: -2.5rem auto 2rem;
      padding: 0 1.5rem;
      position: sticky;
      top: 1rem;
      z-index: 100;
    }
    .filters {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 1.5rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-end;
      border: 2px solid white;
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      flex: 1 1 140px;
    }
    .filter-group label {
      font-size: 0.85rem;
      font-weight: 800;
      color: var(--primary);
      margin-left: 0.2rem;
    }
    .filter-group input,
    .filter-group select {
      border: 2px solid #E2E8F0;
      border-radius: var(--radius-md);
      padding: 0.7rem 1rem;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.95rem;
      background: white;
      color: var(--ink);
      transition: all 0.2s;
      outline: none;
      width: 100%;
    }
    .filter-group input:focus, 
    .filter-group select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.15);
    }

    .btn-reset {
      padding: 0.7rem 1.2rem;
      border-radius: var(--radius-md);
      border: none;
      background: var(--secondary);
      color: white;
      font-weight: 800;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
      box-shadow: 0 4px 15px rgba(255, 118, 117, 0.3);
    }
    .btn-reset:hover { 
      transform: translateY(-2px); 
      box-shadow: 0 6px 20px rgba(255, 118, 117, 0.4);
    }

    .result-count {
      align-self: flex-end;
      font-size: 0.9rem;
      font-weight: 800;
      color: var(--primary);
      white-space: nowrap;
      padding-bottom: 0.4rem;
      margin-left: auto;
    }

    /* ── SEARCH BOX ───────────────────────────────────── */
    .search-wrap {
      max-width: 1100px;
      margin: 0 auto 2rem;
      padding: 0 1.5rem;
    }
    .search-box {
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 1.2rem 1.5rem 1.2rem 3.5rem;
      border-radius: 100px;
      border: none;
      box-shadow: var(--shadow);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--ink);
      outline: none;
      font-family: inherit;
      transition: box-shadow 0.2s;
    }
    .search-box input:focus {
      box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.15);
    }
    .search-icon {
      position: absolute;
      left: 1.5rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
      pointer-events: none;
    }

    /* ── MAIN LAYOUT ────────────────────────────────────── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem 1.5rem 4rem;
    }

    /* ── EVENT CARDS ──────────────────────────────────── */
    #event-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
    }
    .event-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      position: relative;
      border: none;
      box-shadow: var(--shadow);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      animation: fadeUp .4s ease both;
    }
    .event-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-hover);
    }
    
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(15px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-meta {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.8rem;
    }
    .tag {
      background: var(--sky);
      color: var(--primary);
      border: none;
      padding: 0.4rem 0.8rem;
      font-weight: 800;
      font-size: 0.75rem;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .tag.age { background: #FFEAA7; color: #D6A000; }
    .tag.venue { background: #DFF9FB; color: #0984E3; }

    .card-title {
      font-size: 1.35rem;
      font-weight: 900;
      color: var(--primary);
      margin: 0 0 0.5rem;
      line-height: 1.25;
    }
    .card-subtitle {
      font-size: 0.95rem;
      font-weight: 600;
      color: #636e72;
      margin-bottom: 1.2rem;
      flex-grow: 1;
    }

    .card-info {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      font-size: 0.9rem;
      color: var(--ink);
      margin-bottom: 1.5rem;
    }
    .card-info span { display: flex; align-items: center; gap: 0.5rem; font-weight: 700;}

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
    }
    .price-badge {
      background: var(--success);
      color: #006266;
      padding: 0.4rem 1rem;
      border-radius: 12px;
      font-weight: 900;
      font-size: 1.1rem;
    }
    .btn-details {
      background: var(--primary);
      color: white;
      border-radius: 12px;
      padding: 0.8rem 1.2rem;
      font-weight: 800;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.2s, background 0.2s;
      box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
    }
    .btn-details:hover {
      transform: translateY(-2px);
      background: #5A4FCF;
      box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4);
    }

    /* ── EMPTY STATE ────────────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--primary);
    }
    .empty-state .big { font-size: 4rem; margin-bottom: 1rem; display: block;}
    .empty-state p { font-size: 1.2rem; font-weight: 800;}

    /* ── LOADING ────────────────────────────────────────── */
    #loading {
      text-align: center;
      padding: 4rem;
      color: var(--secondary);
      font-size: 1.2rem;
      font-weight: 800;
    }
    .spinner {
      display: inline-block;
      width: 40px; height: 40px;
      border: 4px solid var(--sky);
      border-top-color: var(--secondary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MODAL ─────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(45, 52, 54, 0.6);
      backdrop-filter: blur(5px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--card-bg);
      border-radius: 30px;
      border: 6px solid var(--primary);
      max-width: 650px;
      width: 100%;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
      transform: scale(0.9) translateY(20px);
      transition: transform .3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .modal-overlay.open .modal { transform: scale(1) translateY(0); }

    .modal-header {
      background: var(--primary);
      padding: 1.8rem 2rem 1.5rem;
      border-radius: 22px 22px 0 0;
      position: relative;
      color: white;
    }
    .modal-header h2 {
      font-size: 1.6rem;
      font-weight: 900;
      line-height: 1.2;
      padding-right: 2.5rem;
      margin-bottom: 0.5rem;
    }
    .modal-header p {
      font-size: 1rem;
      font-weight: 600;
      opacity: 0.9;
    }
    .modal-close {
      position: absolute;
      top: 1.2rem; right: 1.2rem;
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 2px solid white;
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 1.2rem;
      font-weight: 900;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .modal-close:hover { background: white; color: var(--primary); transform: rotate(90deg); }

    .modal-body {
      padding: 2rem;
      overflow-y: auto;
      flex: 1;
    }
    .modal-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }
    .modal-detail-text {
      font-size: 1.05rem;
      line-height: 1.6;
      font-weight: 600;
      color: var(--ink);
      white-space: pre-wrap;
      border-top: 2px dashed #dfe6e9;
      padding-top: 1.5rem;
    }
    .modal-footer {
      padding: 1.5rem 2rem;
      background: var(--sky);
      border-radius: 0 0 22px 22px;
      display: flex;
    }
    .btn-link {
      flex: 1;
      padding: 1rem;
      border-radius: 100px;
      background: var(--accent);
      color: var(--ink);
      font-family: inherit;
      font-size: 1.15rem;
      font-weight: 900;
      border: none;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 4px 15px rgba(253, 203, 110, 0.4);
    }
    .btn-link:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(253, 203, 110, 0.6);
    }

    /* ── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 768px) {
      .filters { gap: .5rem; }
      .filter-group { flex-basis: calc(50% - .25rem); }
    }
    @media (max-width: 480px) {
      #event-list { grid-template-columns: 1fr; }
      .filter-group { flex-basis: 100%; }
      .btn-reset { width: 100%; margin-top: 0.5rem;}
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>Abenteuer Stadt! 🎨</h1>
    <p>Finde die coolsten Workshops & Events in Ludwigsburg</p>
    <span class="header-badge">✨ sooraj.de</span>
  </div>
</header>

<div class="filters-wrap">
  <div class="filters">
    <div class="filter-group">
      <label>📅 Wann geht's los?</label>
      <input type="date" id="filter-date-from" />
    </div>
    <div class="filter-group">
      <label>🏁 Bis wann?</label>
      <input type="date" id="filter-date-to" />
    </div>
    <div class="filter-group">
      <label>🎂 Wie alt bist du?</label>
      <select id="filter-age">
        <option value="">Alle Altersgruppen</option>
        <option value="Ab 4 Jahren">Ab 4 Jahren</option>
        <option value="Ab 6 Jahren">Ab 6 Jahren</option>
        <option value="Ab 8 Jahren">Ab 8 Jahren</option>
        <option value="Ab 10 Jahren">Ab 10 Jahren</option>
        <option value="Ab 12 Jahren">Ab 12 Jahren</option>
        <option value="Für Erwachsene">Für Große (Erwachsene)</option>
        <option value="Kinder und Erwachsene">Kids & Eltern</option>
        <option value="Kinder (allgemein)">Kinder (allgemein)</option>
      </select>
    </div>
    <div class="filter-group">
      <label>📍 Wo suchen wir?</label>
      <select id="filter-venue">
        <option value="">Alle Orte</option>
      </select>
    </div>
    <div class="filter-group">
      <label>🎭 Was möchtest du machen?</label>
      <select id="filter-category">
        <option value="">Alle Abenteuer</option>
      </select>
    </div>
    <button class="btn-reset" id="btn-reset">🗑️ Alles löschen</button>
    <span class="result-count" id="result-count"></span>
  </div>
</div>

<div class="search-wrap">
  <div class="search-box">
    <span class="search-icon">🚀</span>
    <input type="text" id="search-input" placeholder="Tippe hier, um nach Spaß zu suchen..." />
  </div>
</div>

<main>
  <div id="loading">
    <div class="spinner"></div><br>Wir suchen die besten Abenteuer für dich...
  </div>
  <div id="event-list"></div>
</main>

<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <button class="modal-close" id="modal-close" aria-label="Schließen">✕</button>
      <h2 id="modal-title"></h2>
      <p id="modal-subtitle"></p>
    </div>
    <div class="modal-body">
      <div class="modal-meta" id="modal-meta"></div>
      <div class="modal-detail-text" id="modal-detail"></div>
    </div>
    <div class="modal-footer">
      <a class="btn-link" id="modal-link" href="#" target="_blank" rel="noopener">
        Jetzt anmelden! ➔
      </a>
    </div>
  </div>
</div>

<script>
// ── Helpers ────────────────────────────────────────────────
// Parse manifest dates in DD.MM.YYYY format
function parseDDMMYYYY(str) {
  if (!str) return null;
  const m = str.match(/^(\d{2})\.(\d{2})\.(\d{4})$/);
  if (!m) return null;
  return new Date(+m[3], +m[2] - 1, +m[1]);
}

function parseGermanDate(str) {
  if (!str) return null;
  const months = {
    'Jan':0,'Feb':1,'Mär':2,'Mar':2,'Apr':3,'Mai':4,'Jun':5,
    'Jul':6,'Aug':7,'Sep':8,'Okt':9,'Nov':10,'Dez':11
  };
  const m = str.match(/(\d+)\.\s+(\w+)\s+(\d{4})/);
  if (!m) return null;
  const mon = months[m[2].substring(0,3)];
  if (mon === undefined) return null;
  return new Date(+m[3], mon, +m[1]);
}

function formatDate(str) {
  const d = parseGermanDate(str);
  if (!d) return str;
  return d.toLocaleDateString('de-DE', {weekday:'short', day:'numeric', month:'long', year:'numeric'});
}

function decodeHtml(str) {
  return str.replace(/&amp;/g, '&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
}

function extractAgeTag(ev) {
  if (ev.age_group) return ev.age_group;
  const cats = (ev.Categories || '').split(',').map(c => decodeHtml(c.trim())).filter(Boolean);
  const ages = cats.filter(c => c.includes('Jahren') || c.includes('Erwachsene') || c.includes('Kinder und'));
  return ages[0] || null;
}

// ── State ──────────────────────────────────────────────────
let allEvents = [];

// ── Render ─────────────────────────────────────────────────
function renderEvents(events) {
  const list = document.getElementById('event-list');
  document.getElementById('result-count').textContent =
    events.length === allEvents.length
      ? `${events.length} Abenteuer`
      : `${events.length} von ${allEvents.length}`;

  if (!events.length) {
    list.innerHTML = `
      <div class="empty-state">
        <span class="big">🕵️‍♂️</span>
        <p>Oh nein! Keine Abenteuer gefunden.<br>Versuche es mit anderen Filtern!</p>
      </div>`;
    return;
  }

  list.innerHTML = events.map((ev, i) => {
    const cats = ev.Categories ? ev.Categories.split(',').map(c => decodeHtml(c.trim())).filter(Boolean) : [];
    const ageTag = extractAgeTag(ev);
    const otherCats = cats
      .filter(c => !c.includes('Jahren') && !c.includes('Erwachsene') && !c.startsWith('für Kinder und') && !c.startsWith('Workshops_') && !c.startsWith('alle '))
      .slice(0, 2);

    return `
    <div class="event-card" style="animation-delay:${Math.min(i * 30, 300)}ms">
      <div class="card-meta">
        ${ageTag ? `<span class="tag age">🎈 ${ageTag}</span>` : ''}
        ${otherCats.map(c => `<span class="tag">🏷️ ${c}</span>`).join('')}
        <span class="tag venue">📍 ${decodeHtml(ev.Venue)}</span>
      </div>
      <h3 class="card-title">${decodeHtml(ev.Title)}</h3>
      ${ev.Subtitle ? `<div class="card-subtitle">${decodeHtml(ev.Subtitle)}</div>` : ''}
      <div class="card-info">
        <span>📅 ${formatDate(ev.Date_Start)}${ev.Date_End && ev.Date_End !== ev.Date_Start ? ' – ' + formatDate(ev.Date_End) : ''}</span>
        ${ev.Time ? `<span>⏰ ${ev.Time}</span>` : ''}
        ${ev.Course_Nr ? `<span>🎟️ Kurs-Nr: ${ev.Course_Nr}</span>` : ''}
      </div>
      <div class="card-footer">
        <span class="price-badge">${decodeHtml(ev.Price) || '🎁 Kostenlos'}</span>
        <button class="btn-details" data-file="${ev.detail_file}" data-idx="${i}">Details ✨</button>
      </div>
    </div>`;
  }).join('');

  // bind detail buttons
  list.querySelectorAll('.btn-details').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = +btn.dataset.idx;
      openModal(events[idx], btn.dataset.file);
    });
  });
}

// ── Filters ────────────────────────────────────────────────
function applyFilters() {
  const from    = document.getElementById('filter-date-from').value;
  const to      = document.getElementById('filter-date-to').value;
  const age     = document.getElementById('filter-age').value;
  const venue   = document.getElementById('filter-venue').value;
  const cat     = document.getElementById('filter-category').value;
  const search  = document.getElementById('search-input').value.toLowerCase().trim();

  const fromDate = from ? new Date(from) : null;
  const toDate   = to   ? new Date(to)   : null;

  const filtered = allEvents.filter(ev => {
    // For date filtering, a single-day event has Date_End = Date_Start.
    // Events with no Date_End (dash/empty) fall back to Date_Start so they
    // are correctly excluded once their start date has passed.
    const evStart = parseDDMMYYYY(ev.Date_Start) || parseGermanDate(ev.Date_Start);
    const rawEnd  = ev.Date_End && ev.Date_End !== '–' && ev.Date_End.trim() !== ''
                    ? ev.Date_End : ev.Date_Start;
    const evEnd   = parseDDMMYYYY(rawEnd) || parseGermanDate(rawEnd) || evStart;

    // Event must overlap the selected range:
    //   event ends on or after fromDate  AND  event starts on or before toDate
    if (fromDate && evEnd   && evEnd   < fromDate) return false;
    if (toDate   && evStart && evStart > toDate)   return false;

    if (age && (ev.age_group || '') !== age) return false;
    if (venue && decodeHtml(ev.Venue) !== venue) return false;
    if (cat && !ev.Categories.includes(cat)) return false;

    if (search) {
      const haystack = [ev.Title, ev.Subtitle, ev.Venue, ev.Categories, ev.Course_Nr].join(' ').toLowerCase();
      if (!haystack.includes(search)) return false;
    }

    return true;
  });

  renderEvents(filtered);
}

// ── Modal ──────────────────────────────────────────────────
function openModal(ev, detailFile) {
  const overlay = document.getElementById('modal-overlay');
  document.getElementById('modal-title').textContent    = decodeHtml(ev.Title);
  document.getElementById('modal-subtitle').textContent = decodeHtml(ev.Subtitle || '');
  document.getElementById('modal-link').href            = ev.Link || '#';

  const cats = (ev.Categories || '').split(',').map(c => decodeHtml(c.trim()));
  const ageTag = extractAgeTag(ev);
  document.getElementById('modal-meta').innerHTML = `
    ${ageTag ? `<span class="tag age">🎈 ${ageTag}</span>` : ''}
    <span class="tag">📅 ${formatDate(ev.Date_Start)}</span>
    ${ev.Time ? `<span class="tag">⏰ ${ev.Time}</span>` : ''}
    <span class="tag venue">📍 ${decodeHtml(ev.Venue)}</span>
    <span class="tag">🪙 ${decodeHtml(ev.Price)}</span>
  `;

  const detailEl = document.getElementById('modal-detail');
  detailEl.textContent = 'Spannende Infos werden geladen... 🪄';

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  // fetch detail txt
  fetch(detailFile)
    .then(r => r.ok ? r.text() : Promise.reject(r.status))
    .then(text => {
      // Strip the structured header block (everything up to the === separator)
      const parts = text.split(/={10,}/);
      let body = (parts[1] || parts[0]).trim();

      // Clean scraped noise from body text:
      // 1. Remove cookie banner boilerplate (from "Wir nutzen Cookies" onward)
      body = body.replace(/Wir nutzen Cookies[\s\S]*/i, '').trim();
      // 2. Remove site navigation junk lines (Gehe zum ..., Zurück, Impressum etc.)
      const noisePatterns = [
        /^Gehe zum .*/gm,
        /^Gebärdensprache\s*$/gm,
        /^leichte Sprache\s*$/gm,
        /^Zurück\s*$/gm,
        /^Impressum\s*$/gm,
        /^Datenschutz\w*\s*$/gm,
        /^Cookies\s*$/gm,
        /^Barrierefreiheit\s*$/gm,
        /^Kontakt\s*$/gm,
        /^anmelden\s*$/gm,
        /^Zum Seitenanfang\s*$/gm,
        /^OpenStreetMap\s*$/gm,
        /^Fahrplanauskunft\s*$/gm,
        /^Powered by .*$/gm,
        /^Veranstaltungen\s*$/gm,
        /^Ausstellungen\s*$/gm,
        /^Newsletter\s*$/gm,
        /^Anfahrt\s*$/gm,
        /^Aktuelles\s*$/gm,
      ];
      noisePatterns.forEach(p => { body = body.replace(p, ''); });
      // 3. Collapse 3+ consecutive blank lines into a single blank line
      body = body.replace(/\n{3,}/g, '\n\n').trim();

      detailEl.textContent = body;
    })
    .catch(() => {
      detailEl.textContent = 'Ups! Die Infos haben sich versteckt. 🙈';
    });
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-close').addEventListener('click', e => {
  e.stopPropagation();
  closeModal();
});
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Populate dropdowns ─────────────────────────────────────
function populateDropdowns() {
  const venues = [...new Set(allEvents.map(e => decodeHtml(e.Venue)))].sort();
  const venSel = document.getElementById('filter-venue');
  venues.forEach(v => {
    const o = document.createElement('option');
    o.value = v; o.textContent = v;
    venSel.appendChild(o);
  });

  const excluded = ['Jahre','Erwachsene','Workshops_','alle Ferien'];
  const cats = [...new Set(
    allEvents.flatMap(e =>
      e.Categories.split(',')
        .map(c => decodeHtml(c.trim()))
        .filter(c => c && !excluded.some(x => c.includes(x)))
    )
  )].sort();

  const catSel = document.getElementById('filter-category');
  cats.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    catSel.appendChild(o);
  });
}

// ── Init ───────────────────────────────────────────────────
document.getElementById('btn-reset').addEventListener('click', () => {
  document.getElementById('filter-date-from').value = '';
  document.getElementById('filter-date-to').value   = '';
  document.getElementById('filter-age').value       = '';
  document.getElementById('filter-venue').value     = '';
  document.getElementById('filter-category').value  = '';
  document.getElementById('search-input').value     = '';
  applyFilters();
});

['filter-date-from','filter-date-to','filter-age','filter-venue','filter-category'].forEach(id => {
  document.getElementById(id).addEventListener('change', applyFilters);
});
document.getElementById('search-input').addEventListener('input', applyFilters);

Papa.parse('manifest.csv', {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete(results) {
    document.getElementById('loading').style.display = 'none';
    allEvents = results.data;
    populateDropdowns();
    renderEvents(allEvents);
  },
  error(err) {
    document.getElementById('loading').innerHTML =
      '<p style="color:var(--secondary)">Ohje! Ein Fehler beim Laden der Events: ' + err.message + '</p>';
  }
});
</script>
