<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stadtprogramm – Kurse & Workshops</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,800;1,9..144,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <style>
    /* ── TOKENS ─────────────────────────────────────────── */
    :root {
      --ink:        #1a1209;
      --paper:      #faf6ef;
      --cream:      #f2ebe0;
      --gold:       #c9933a;
      --gold-light: #e8c07a;
      --rust:       #b84c2e;
      --sage:       #4a6741;
      --mist:       #d4cfc8;
      --card-bg:    #ffffff;
      --radius:     12px;
      --shadow:     0 2px 12px rgba(26,18,9,.09);
      --shadow-lg:  0 8px 40px rgba(26,18,9,.18);
    }

    /* ── RESET ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      background: var(--ink);
      padding: 2rem 1.5rem 1.8rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 18px,
        rgba(201,147,58,.07) 18px,
        rgba(201,147,58,.07) 19px
      );
    }
    .header-inner { position: relative; z-index: 1; }
    header h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 800;
      color: var(--gold-light);
      letter-spacing: -.02em;
      line-height: 1.1;
    }
    header p {
      margin-top: .5rem;
      color: var(--mist);
      font-size: .95rem;
      font-weight: 300;
      letter-spacing: .04em;
    }
    .header-badge {
      display: inline-block;
      margin-top: 1rem;
      background: var(--gold);
      color: var(--ink);
      font-size: .75rem;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: .3em .9em;
      border-radius: 100px;
    }

    /* ── FILTER BAR ─────────────────────────────────────── */
    .filters-wrap {
      background: var(--cream);
      border-bottom: 1px solid var(--mist);
      padding: 1.2rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 2px 8px rgba(26,18,9,.06);
    }
    .filters {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: .7rem;
      align-items: flex-end;
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: .25rem;
      flex: 1 1 140px;
    }
    .filter-group label {
      font-size: .7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #7a6e62;
    }
    .filter-group input,
    .filter-group select {
      border: 1.5px solid var(--mist);
      border-radius: 8px;
      padding: .5rem .75rem;
      font-family: inherit;
      font-size: .88rem;
      background: white;
      color: var(--ink);
      outline: none;
      transition: border-color .18s;
      width: 100%;
    }
    .filter-group input:focus,
    .filter-group select:focus { border-color: var(--gold); }

    .btn-reset {
      padding: .55rem 1.2rem;
      border-radius: 8px;
      border: 1.5px solid var(--rust);
      background: transparent;
      color: var(--rust);
      font-family: inherit;
      font-size: .85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .18s;
      align-self: flex-end;
      white-space: nowrap;
    }
    .btn-reset:hover { background: var(--rust); color: white; }

    .result-count {
      align-self: flex-end;
      font-size: .8rem;
      color: #8a7e72;
      white-space: nowrap;
      padding-bottom: .4rem;
    }

    /* ── SEARCH ─────────────────────────────────────────── */
    .search-wrap {
      max-width: 1100px;
      margin: 1.4rem auto .4rem;
      padding: 0 1.5rem;
    }
    .search-box {
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: .7rem 1rem .7rem 2.8rem;
      border: 1.5px solid var(--mist);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: .95rem;
      background: white;
      outline: none;
      transition: border-color .18s;
    }
    .search-box input:focus { border-color: var(--gold); }
    .search-icon {
      position: absolute;
      left: .85rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--mist);
      font-size: 1.1rem;
      pointer-events: none;
    }

    /* ── MAIN LAYOUT ────────────────────────────────────── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem 1.5rem 4rem;
    }

    /* ── CARDS GRID ─────────────────────────────────────── */
    #event-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 1.1rem;
    }

    .event-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform .2s, box-shadow .2s;
      border: 1px solid rgba(201,147,58,.12);
      animation: fadeUp .35s ease both;
    }
    .event-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-accent {
      height: 5px;
      background: linear-gradient(90deg, var(--gold), var(--rust));
    }
    .card-body { padding: 1.1rem 1.2rem 1rem; flex: 1; }

    .card-meta {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      margin-bottom: .55rem;
    }
    .tag {
      font-size: .68rem;
      font-weight: 500;
      letter-spacing: .05em;
      text-transform: uppercase;
      padding: .2em .65em;
      border-radius: 100px;
      background: var(--cream);
      color: #7a6e62;
      border: 1px solid var(--mist);
    }
    .tag.age {
      background: #eef3ed;
      color: var(--sage);
      border-color: #bdd0bb;
    }
    .tag.venue {
      background: #fdf3e4;
      color: #8a5e1a;
      border-color: #e8d5a8;
    }

    .card-title {
      font-family: 'Fraunces', serif;
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.3;
      color: var(--ink);
      margin-bottom: .3rem;
    }
    .card-subtitle {
      font-size: .82rem;
      color: #8a7e72;
      font-style: italic;
      margin-bottom: .7rem;
    }

    .card-info {
      display: flex;
      flex-direction: column;
      gap: .22rem;
      font-size: .82rem;
      color: #6a5f54;
    }
    .card-info span { display: flex; align-items: center; gap: .4rem; }
    .card-info .icon { font-size: .9em; opacity: .7; }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .75rem 1.2rem;
      border-top: 1px solid var(--cream);
      background: var(--cream);
    }
    .price-badge {
      font-family: 'Fraunces', serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--rust);
    }
    .btn-details {
      padding: .4rem .95rem;
      border-radius: 8px;
      background: var(--ink);
      color: var(--gold-light);
      font-family: inherit;
      font-size: .8rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: background .18s, transform .1s;
      letter-spacing: .02em;
    }
    .btn-details:hover { background: #2e2415; transform: scale(1.04); }

    /* ── EMPTY STATE ────────────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: #9a8e82;
    }
    .empty-state .big { font-size: 3rem; margin-bottom: .5rem; }
    .empty-state p { font-size: 1rem; }

    /* ── LOADING ────────────────────────────────────────── */
    #loading {
      text-align: center;
      padding: 4rem;
      color: #8a7e72;
      font-size: 1rem;
    }
    .spinner {
      display: inline-block;
      width: 32px; height: 32px;
      border: 3px solid var(--mist);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MODAL ──────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26,18,9,.55);
      backdrop-filter: blur(3px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--card-bg);
      border-radius: 16px;
      max-width: 640px;
      width: 100%;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-lg);
      transform: scale(.96) translateY(10px);
      transition: transform .22s;
    }
    .modal-overlay.open .modal { transform: scale(1) translateY(0); }

    .modal-header {
      background: var(--ink);
      padding: 1.4rem 1.5rem 1.2rem;
      border-radius: 16px 16px 0 0;
      position: relative;
    }
    .modal-header h2 {
      font-family: 'Fraunces', serif;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--gold-light);
      line-height: 1.3;
      padding-right: 2rem;
    }
    .modal-header p {
      font-size: .83rem;
      color: var(--mist);
      margin-top: .3rem;
      font-style: italic;
    }
    .modal-close {
      position: absolute;
      top: 1rem; right: 1rem;
      width: 30px; height: 30px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,.12);
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .modal-close:hover { background: rgba(255,255,255,.25); }

    .modal-body {
      padding: 1.4rem 1.5rem;
      overflow-y: auto;
      flex: 1;
    }
    .modal-meta {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      margin-bottom: 1.2rem;
    }
    .modal-detail-text {
      font-size: .9rem;
      line-height: 1.75;
      color: #3a3028;
      white-space: pre-wrap;
      border-top: 1px solid var(--cream);
      padding-top: 1rem;
    }
    .modal-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--cream);
      display: flex;
      gap: .75rem;
      flex-wrap: wrap;
    }
    .btn-link {
      flex: 1;
      padding: .6rem 1rem;
      border-radius: 8px;
      background: var(--gold);
      color: var(--ink);
      font-family: inherit;
      font-size: .85rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background .18s;
    }
    .btn-link:hover { background: var(--gold-light); }

    /* ── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 600px) {
      .filters { gap: .5rem; }
      .filter-group { flex-basis: calc(50% - .25rem); }
      #event-list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <h1>Stadtprogramm</h1>
    <p>Kurse · Workshops · Veranstaltungen in Ludwigsburg</p>
    <span class="header-badge">sooraj.de</span>
  </div>
</header>

<!-- FILTERS -->
<div class="filters-wrap">
  <div class="filters">
    <div class="filter-group">
      <label>Von Datum</label>
      <input type="date" id="filter-date-from" />
    </div>
    <div class="filter-group">
      <label>Bis Datum</label>
      <input type="date" id="filter-date-to" />
    </div>
    <div class="filter-group">
      <label>Altersgruppe</label>
      <select id="filter-age">
        <option value="">Alle Altersgruppen</option>
        <option value="ab 4 Jahren">Ab 4 Jahren</option>
        <option value="ab 6 Jahren">Ab 6 Jahren</option>
        <option value="ab 8 Jahren">Ab 8 Jahren</option>
        <option value="ab 10 Jahren">Ab 10 Jahren</option>
        <option value="ab 12 Jahren">Ab 12 Jahren</option>
        <option value="Erwachsene">Für Erwachsene</option>
        <option value="Kinder und Erwachsene">Kinder und Erwachsene</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Veranstaltungsort</label>
      <select id="filter-venue">
        <option value="">Alle Orte</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Kategorie</label>
      <select id="filter-category">
        <option value="">Alle Kategorien</option>
      </select>
    </div>
    <button class="btn-reset" id="btn-reset">✕ Zurücksetzen</button>
    <span class="result-count" id="result-count"></span>
  </div>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Suche nach Titel, Beschreibung, Kursleiter …" />
  </div>
</div>

<!-- MAIN -->
<main>
  <div id="loading">
    <div class="spinner"></div><br>Veranstaltungen werden geladen…
  </div>
  <div id="event-list"></div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <button class="modal-close" id="modal-close" aria-label="Schließen">✕</button>
      <h2 id="modal-title"></h2>
      <p id="modal-subtitle"></p>
    </div>
    <div class="modal-body">
      <div class="modal-meta" id="modal-meta"></div>
      <div class="modal-detail-text" id="modal-detail"></div>
    </div>
    <div class="modal-footer">
      <a class="btn-link" id="modal-link" href="#" target="_blank" rel="noopener">
        🔗 Zur offiziellen Seite
      </a>
    </div>
  </div>
</div>

<script>
// ── Helpers ────────────────────────────────────────────────
function parseGermanDate(str) {
  if (!str) return null;
  // "Di 19. Mai 2026" → Date
  const months = {
    'Jan':0,'Feb':1,'Mär':2,'Mar':2,'Apr':3,'Mai':4,'Jun':5,
    'Jul':6,'Aug':7,'Sep':8,'Okt':9,'Nov':10,'Dez':11
  };
  const m = str.match(/(\d+)\.\s+(\w+)\s+(\d{4})/);
  if (!m) return null;
  const mon = months[m[2].substring(0,3)];
  if (mon === undefined) return null;
  return new Date(+m[3], mon, +m[1]);
}

function formatDate(str) {
  const d = parseGermanDate(str);
  if (!d) return str;
  return d.toLocaleDateString('de-DE', {weekday:'short', day:'numeric', month:'long', year:'numeric'});
}

function decodeHtml(str) {
  return str.replace(/&amp;/g, '&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
}

function extractAgeTag(categories) {
  const ages = categories.filter(c => c.includes('Jahren') || c.includes('Erwachsene') || c.includes('Kinder und'));
  return ages[0] || null;
}

function cardAnim(i) {
  return `animation-delay:${Math.min(i * 40, 400)}ms`;
}

// ── State ──────────────────────────────────────────────────
let allEvents = [];

// ── Render ─────────────────────────────────────────────────
function renderEvents(events) {
  const list = document.getElementById('event-list');
  document.getElementById('result-count').textContent =
    events.length === allEvents.length
      ? `${events.length} Veranstaltungen`
      : `${events.length} von ${allEvents.length}`;

  if (!events.length) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="big">🔎</div>
        <p>Keine Veranstaltungen gefunden.<br>Bitte Filter anpassen.</p>
      </div>`;
    return;
  }

  list.innerHTML = events.map((ev, i) => {
    const cats = ev.Categories.split(',').map(c => decodeHtml(c.trim())).filter(Boolean);
    const ageTag = extractAgeTag(cats);
    const otherCats = cats
      .filter(c => !c.includes('Jahren') && !c.includes('Erwachsene') && !c.startsWith('für Kinder und') && !c.startsWith('Workshops_') && !c.startsWith('alle '))
      .slice(0, 2);

    return `
    <div class="event-card" style="${cardAnim(i)}">
      <div class="card-accent"></div>
      <div class="card-body">
        <div class="card-meta">
          ${ageTag ? `<span class="tag age">👶 ${ageTag}</span>` : ''}
          ${otherCats.map(c => `<span class="tag">${c}</span>`).join('')}
          <span class="tag venue">📍 ${decodeHtml(ev.Venue)}</span>
        </div>
        <div class="card-title">${decodeHtml(ev.Title)}</div>
        ${ev.Subtitle ? `<div class="card-subtitle">${decodeHtml(ev.Subtitle)}</div>` : ''}
        <div class="card-info">
          <span><span class="icon">📅</span> ${formatDate(ev.Date_Start)}${ev.Date_End && ev.Date_End !== ev.Date_Start ? ' – ' + formatDate(ev.Date_End) : ''}</span>
          ${ev.Time ? `<span><span class="icon">🕐</span> ${ev.Time}</span>` : ''}
          ${ev.Course_Nr ? `<span><span class="icon">🎓</span> Kurs-Nr: ${ev.Course_Nr}</span>` : ''}
        </div>
      </div>
      <div class="card-footer">
        <span class="price-badge">${decodeHtml(ev.Price) || 'Kostenlos'}</span>
        <button class="btn-details" data-file="${ev.detail_file}" data-idx="${i}">Details →</button>
      </div>
    </div>`;
  }).join('');

  // bind detail buttons
  list.querySelectorAll('.btn-details').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = +btn.dataset.idx;
      openModal(events[idx], btn.dataset.file);
    });
  });
}

// ── Filters ────────────────────────────────────────────────
function applyFilters() {
  const from    = document.getElementById('filter-date-from').value;
  const to      = document.getElementById('filter-date-to').value;
  const age     = document.getElementById('filter-age').value;
  const venue   = document.getElementById('filter-venue').value;
  const cat     = document.getElementById('filter-category').value;
  const search  = document.getElementById('search-input').value.toLowerCase().trim();

  const fromDate = from ? new Date(from) : null;
  const toDate   = to   ? new Date(to)   : null;

  const filtered = allEvents.filter(ev => {
    const evDate = parseGermanDate(ev.Date_Start);

    if (fromDate && evDate && evDate < fromDate) return false;
    if (toDate   && evDate && evDate > toDate)   return false;

    if (age && !ev.Categories.toLowerCase().includes(age.toLowerCase())) return false;
    if (venue && decodeHtml(ev.Venue) !== venue) return false;
    if (cat && !ev.Categories.includes(cat)) return false;

    if (search) {
      const haystack = [ev.Title, ev.Subtitle, ev.Venue, ev.Categories, ev.Course_Nr].join(' ').toLowerCase();
      if (!haystack.includes(search)) return false;
    }

    return true;
  });

  renderEvents(filtered);
}

// ── Modal ──────────────────────────────────────────────────
function openModal(ev, detailFile) {
  const overlay = document.getElementById('modal-overlay');
  document.getElementById('modal-title').textContent    = decodeHtml(ev.Title);
  document.getElementById('modal-subtitle').textContent = decodeHtml(ev.Subtitle || '');
  document.getElementById('modal-link').href            = ev.Link || '#';

  const cats = ev.Categories.split(',').map(c => decodeHtml(c.trim()));
  const ageTag = extractAgeTag(cats);
  document.getElementById('modal-meta').innerHTML = `
    ${ageTag ? `<span class="tag age">👶 ${ageTag}</span>` : ''}
    <span class="tag">📅 ${formatDate(ev.Date_Start)}</span>
    ${ev.Time ? `<span class="tag">🕐 ${ev.Time}</span>` : ''}
    <span class="tag venue">📍 ${decodeHtml(ev.Venue)}</span>
    <span class="tag">💶 ${decodeHtml(ev.Price)}</span>
  `;

  const detailEl = document.getElementById('modal-detail');
  detailEl.textContent = 'Beschreibung wird geladen…';

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  // fetch detail txt
  fetch(detailFile)
    .then(r => r.ok ? r.text() : Promise.reject(r.status))
    .then(text => {
      // strip the header block (everything up to ====)
      const parts = text.split(/={10,}/);
      const body = (parts[1] || parts[0]).trim();
      detailEl.textContent = body;
    })
    .catch(() => {
      detailEl.textContent = 'Beschreibung konnte nicht geladen werden.';
    });
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Populate dropdowns ─────────────────────────────────────
function populateDropdowns() {
  const venues = [...new Set(allEvents.map(e => decodeHtml(e.Venue)))].sort();
  const venSel = document.getElementById('filter-venue');
  venues.forEach(v => {
    const o = document.createElement('option');
    o.value = v; o.textContent = v;
    venSel.appendChild(o);
  });

  // collect non-age, non-internal categories
  const excluded = ['Jahre','Erwachsene','Workshops_','alle Ferien'];
  const cats = [...new Set(
    allEvents.flatMap(e =>
      e.Categories.split(',')
        .map(c => decodeHtml(c.trim()))
        .filter(c => c && !excluded.some(x => c.includes(x)))
    )
  )].sort();

  const catSel = document.getElementById('filter-category');
  cats.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    catSel.appendChild(o);
  });
}

// ── Init ───────────────────────────────────────────────────
document.getElementById('btn-reset').addEventListener('click', () => {
  document.getElementById('filter-date-from').value = '';
  document.getElementById('filter-date-to').value   = '';
  document.getElementById('filter-age').value       = '';
  document.getElementById('filter-venue').value     = '';
  document.getElementById('filter-category').value  = '';
  document.getElementById('search-input').value     = '';
  renderEvents(allEvents);
});

['filter-date-from','filter-date-to','filter-age','filter-venue','filter-category'].forEach(id => {
  document.getElementById(id).addEventListener('change', applyFilters);
});
document.getElementById('search-input').addEventListener('input', applyFilters);

Papa.parse('manifest.csv', {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete(results) {
    document.getElementById('loading').style.display = 'none';
    allEvents = results.data;
    populateDropdowns();
    renderEvents(allEvents);
  },
  error(err) {
    document.getElementById('loading').innerHTML =
      '<p style="color:var(--rust)">Fehler beim Laden der Daten: ' + err.message + '</p>';
  }
});
</script>
