<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stadtprogramm – Ludwigsburg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <style>
    /* ── TWEEN/TEEN DARK MODE TOKENS ───────────────────── */
    :root {
      --bg-main:    #0f172a; /* Slate 900 */
      --bg-card:    #1e293b; /* Slate 800 */
      --bg-input:   #334155; /* Slate 700 */
      --accent-1:   #8b5cf6; /* Vibrant Purple */
      --accent-2:   #06b6d4; /* Cyan */
      --text-main:  #f8fafc; /* Slate 50 */
      --text-muted: #94a3b8; /* Slate 400 */
      --success:    #10b981; /* Emerald */
      
      --radius-lg:  16px;
      --radius-md:  8px;
      --shadow:     0 10px 30px rgba(0, 0, 0, 0.4);
      --glow:       0 0 15px rgba(139, 92, 246, 0.3);
    }

    /* ── RESET & BASE ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER: SLEEK & BOLD ────────────────────────── */
    header {
      background: linear-gradient(135deg, rgba(15,23,42,1) 0%, rgba(30,41,59,1) 100%);
      padding: 4rem 1.5rem 3rem;
      text-align: center;
      position: relative;
      border-bottom: 1px solid var(--bg-input);
    }
    header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
    }
    header h1 {
      font-size: clamp(2.5rem, 6vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(to right, #f8fafc, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }
    header p {
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text-muted);
    }
    .header-badge {
      display: inline-block;
      margin-top: 1.5rem;
      background: transparent;
      border: 1px solid var(--accent-1);
      color: var(--accent-1);
      font-weight: 600;
      padding: 0.4rem 1rem;
      border-radius: 4px;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ── MODERN FILTERS ──────────────────────── */
    .filters-wrap {
      max-width: 1100px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      position: sticky;
      top: 1rem;
      z-index: 100;
    }
    .filters {
      background: rgba(30, 41, 59, 0.85);
      backdrop-filter: blur(12px);
      padding: 1.2rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-end;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      flex: 1 1 140px;
    }
    .filter-group label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .filter-group input,
    .filter-group select {
      background: var(--bg-main);
      border: 1px solid var(--bg-input);
      color: var(--text-main);
      border-radius: var(--radius-md);
      padding: 0.7rem 1rem;
      font-family: inherit;
      font-size: 0.9rem;
      transition: all 0.2s;
      outline: none;
      width: 100%;
    }
    .filter-group input:focus, 
    .filter-group select:focus {
      border-color: var(--accent-1);
      box-shadow: var(--glow);
    }
    /* Fix for date picker icon visibility in dark mode */
    ::-webkit-calendar-picker-indicator {
      filter: invert(1);
      opacity: 0.6;
    }

    .btn-reset {
      padding: 0.7rem 1.2rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--text-muted);
      background: transparent;
      color: var(--text-muted);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-reset:hover { 
      background: var(--text-muted);
      color: var(--bg-main);
    }

    .result-count {
      align-self: flex-end;
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--text-muted);
      white-space: nowrap;
      padding-bottom: 0.4rem;
      margin-left: auto;
    }

    /* ── SEARCH BOX ───────────────────────────────────── */
    .search-wrap {
      max-width: 1100px;
      margin: 0 auto 2rem;
      padding: 0 1.5rem;
    }
    .search-box {
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 1.2rem 1.5rem 1.2rem 3rem;
      border-radius: var(--radius-lg);
      background: var(--bg-card);
      border: 1px solid var(--bg-input);
      color: var(--text-main);
      font-size: 1.1rem;
      outline: none;
      font-family: inherit;
      transition: all 0.2s;
    }
    .search-box input:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
    }
    .search-icon {
      position: absolute;
      left: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
      color: var(--text-muted);
      pointer-events: none;
    }

    /* ── MAIN LAYOUT ────────────────────────────────────── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem 1.5rem 4rem;
    }

    /* ── EVENT CARDS ──────────────────────────────────── */
    #event-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .event-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      position: relative;
      border: 1px solid rgba(255,255,255,0.03);
      box-shadow: var(--shadow);
      transition: transform 0.2s, border-color 0.2s;
      animation: fadeUp .3s ease both;
    }
    .event-card:hover {
      transform: translateY(-5px);
      border-color: var(--accent-1);
    }
    
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-meta {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .tag {
      background: var(--bg-input);
      color: var(--text-main);
      border: none;
      padding: 0.3rem 0.6rem;
      font-weight: 600;
      font-size: 0.7rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .tag.age { color: var(--accent-2); border: 1px solid rgba(6, 182, 212, 0.3); background: transparent; }
    .tag.venue { color: var(--text-muted); }

    .card-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text-main);
      margin: 0 0 0.5rem;
      line-height: 1.3;
    }
    .card-subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 1.2rem;
      flex-grow: 1;
    }

    .card-info {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      background: var(--bg-main);
      padding: 0.8rem;
      border-radius: var(--radius-md);
    }
    .card-info span { display: flex; align-items: center; gap: 0.5rem; font-weight: 400;}

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
    }
    .price-badge {
      color: var(--success);
      font-weight: 600;
      font-size: 1.1rem;
    }
    .btn-details {
      background: var(--accent-1);
      color: white;
      border-radius: var(--radius-md);
      padding: 0.6rem 1.2rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .btn-details:hover {
      background: #7c3aed;
      box-shadow: var(--glow);
    }

    /* ── EMPTY STATE ────────────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }
    .empty-state p { font-size: 1.1rem; font-weight: 400;}

    /* ── LOADING ────────────────────────────────────────── */
    #loading {
      text-align: center;
      padding: 4rem;
      color: var(--text-muted);
      font-size: 1rem;
    }
    .spinner {
      display: inline-block;
      width: 30px; height: 30px;
      border: 3px solid var(--bg-input);
      border-top-color: var(--accent-1);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MODAL ─────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      border: 1px solid var(--bg-input);
      max-width: 650px;
      width: 100%;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transform: scale(0.95) translateY(10px);
      transition: transform .2s ease;
    }
    .modal-overlay.open .modal { transform: scale(1) translateY(0); }

    .modal-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--bg-input);
      position: relative;
    }
    .modal-header h2 {
      font-size: 1.5rem;
      font-weight: 600;
      line-height: 1.3;
      padding-right: 2.5rem;
      margin-bottom: 0.3rem;
    }
    .modal-header p {
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .modal-close {
      position: absolute;
      top: 1.5rem; right: 1.5rem;
      width: 32px; height: 32px;
      border-radius: var(--radius-md);
      background: var(--bg-input);
      color: var(--text-muted);
      border: none;
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .modal-close:hover { background: var(--text-main); color: var(--bg-main); }

    .modal-body {
      padding: 1.5rem;
      overflow-y: auto;
      flex: 1;
    }
    .modal-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .modal-detail-text {
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--text-main);
      white-space: pre-wrap;
    }
    .modal-footer {
      padding: 1.2rem 1.5rem;
      background: var(--bg-main);
      border-top: 1px solid var(--bg-input);
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      display: flex;
    }
    .btn-link {
      flex: 1;
      padding: 0.8rem;
      border-radius: var(--radius-md);
      background: linear-gradient(90deg, var(--accent-1), #c084fc);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: opacity .2s;
    }
    .btn-link:hover {
      opacity: 0.9;
    }

    /* ── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 768px) {
      .filters { gap: 0.8rem; }
      .filter-group { flex-basis: calc(50% - 0.4rem); }
    }
    @media (max-width: 480px) {
      #event-list { grid-template-columns: 1fr; }
      .filter-group { flex-basis: 100%; }
      .btn-reset { width: 100%; margin-top: 0.5rem;}
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>Stadtprogramm</h1>
    <p>Events, Kurse & Workshops in Ludwigsburg</p>
    <span class="header-badge">sooraj.de</span>
  </div>
</header>

<div class="filters-wrap">
  <div class="filters">
    <div class="filter-group">
      <label>Von Datum</label>
      <input type="date" id="filter-date-from" />
    </div>
    <div class="filter-group">
      <label>Bis Datum</label>
      <input type="date" id="filter-date-to" />
    </div>
    <div class="filter-group">
      <label>Alter</label>
      <select id="filter-age">
        <option value="">Alle</option>
        <option value="Ab 4 Jahren">Ab 4 Jahren</option>
        <option value="Ab 6 Jahren">Ab 6 Jahren</option>
        <option value="Ab 8 Jahren">Ab 8 Jahren</option>
        <option value="Ab 10 Jahren">Ab 10 Jahren</option>
        <option value="Ab 12 Jahren">Ab 12 Jahren</option>
        <option value="Für Erwachsene">Erwachsene</option>
        <option value="Kinder und Erwachsene">Familien</option>
        <option value="Kinder (allgemein)">Kinder (allg.)</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Location</label>
      <select id="filter-venue">
        <option value="">Alle Orte</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Kategorie</label>
      <select id="filter-category">
        <option value="">Alle Kategorien</option>
      </select>
    </div>
    <button class="btn-reset" id="btn-reset">Filter zurücksetzen</button>
    <span class="result-count" id="result-count"></span>
  </div>
</div>

<div class="search-wrap">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Titel, Info oder Kursnummer suchen..." />
  </div>
</div>

<main>
  <div id="loading">
    <div class="spinner"></div><br>Lade Events...
  </div>
  <div id="event-list"></div>
</main>

<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <button class="modal-close" id="modal-close" aria-label="Schließen">✕</button>
      <h2 id="modal-title"></h2>
      <p id="modal-subtitle"></p>
    </div>
    <div class="modal-body">
      <div class="modal-meta" id="modal-meta"></div>
      <div class="modal-detail-text" id="modal-detail"></div>
    </div>
    <div class="modal-footer">
      <a class="btn-link" id="modal-link" href="#" target="_blank" rel="noopener">
        Offizielle Website öffnen ➔
      </a>
    </div>
  </div>
</div>

<script>
// ── Helpers ────────────────────────────────────────────────
function parseGermanDate(str) {
  if (!str) return null;
  const months = {
    'Jan':0,'Feb':1,'Mär':2,'Mar':2,'Apr':3,'Mai':4,'Jun':5,
    'Jul':6,'Aug':7,'Sep':8,'Okt':9,'Nov':10,'Dez':11
  };
  const m = str.match(/(\d+)\.\s+(\w+)\s+(\d{4})/);
  if (!m) return null;
  const mon = months[m[2].substring(0,3)];
  if (mon === undefined) return null;
  return new Date(+m[3], mon, +m[1]);
}

function formatDate(str) {
  const d = parseGermanDate(str);
  if (!d) return str;
  return d.toLocaleDateString('de-DE', {weekday:'short', day:'numeric', month:'long', year:'numeric'});
}

function decodeHtml(str) {
  return str.replace(/&amp;/g, '&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
}

function extractAgeTag(ev) {
  if (ev.age_group) return ev.age_group;
  const cats = (ev.Categories || '').split(',').map(c => decodeHtml(c.trim())).filter(Boolean);
  const ages = cats.filter(c => c.includes('Jahren') || c.includes('Erwachsene') || c.includes('Kinder und'));
  return ages[0] || null;
}

// ── State ──────────────────────────────────────────────────
let allEvents = [];

// ── Render ─────────────────────────────────────────────────
function renderEvents(events) {
  const list = document.getElementById('event-list');
  document.getElementById('result-count').textContent =
    events.length === allEvents.length
      ? `${events.length} Events gefunden`
      : `${events.length} von ${allEvents.length}`;

  if (!events.length) {
    list.innerHTML = `
      <div class="empty-state">
        <p>Keine passenden Events gefunden. Passe deine Suche an.</p>
      </div>`;
    return;
  }

  list.innerHTML = events.map((ev, i) => {
    const cats = ev.Categories ? ev.Categories.split(',').map(c => decodeHtml(c.trim())).filter(Boolean) : [];
    const ageTag = extractAgeTag(ev);
    const otherCats = cats
      .filter(c => !c.includes('Jahren') && !c.includes('Erwachsene') && !c.startsWith('für Kinder und') && !c.startsWith('Workshops_') && !c.startsWith('alle '))
      .slice(0, 2);

    return `
    <div class="event-card" style="animation-delay:${Math.min(i * 30, 300)}ms">
      <div class="card-meta">
        ${ageTag ? `<span class="tag age">${ageTag}</span>` : ''}
        ${otherCats.map(c => `<span class="tag">${c}</span>`).join('')}
        <span class="tag venue">${decodeHtml(ev.Venue)}</span>
      </div>
      <h3 class="card-title">${decodeHtml(ev.Title)}</h3>
      ${ev.Subtitle ? `<div class="card-subtitle">${decodeHtml(ev.Subtitle)}</div>` : ''}
      <div class="card-info">
        <span>🗓️ ${formatDate(ev.Date_Start)}${ev.Date_End && ev.Date_End !== ev.Date_Start ? ' – ' + formatDate(ev.Date_End) : ''}</span>
        ${ev.Time ? `<span>⏰ ${ev.Time}</span>` : ''}
        ${ev.Course_Nr ? `<span>🎟️ Kurs: ${ev.Course_Nr}</span>` : ''}
      </div>
      <div class="card-footer">
        <span class="price-badge">${decodeHtml(ev.Price) || 'Kostenlos'}</span>
        <button class="btn-details" data-file="${ev.detail_file}" data-idx="${i}">Details</button>
      </div>
    </div>`;
  }).join('');

  list.querySelectorAll('.btn-details').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = +btn.dataset.idx;
      openModal(events[idx], btn.dataset.file);
    });
  });
}

// ── Filters ────────────────────────────────────────────────
function applyFilters() {
  const from    = document.getElementById('filter-date-from').value;
  const to      = document.getElementById('filter-date-to').value;
  const age     = document.getElementById('filter-age').value;
  const venue   = document.getElementById('filter-venue').value;
  const cat     = document.getElementById('filter-category').value;
  const search  = document.getElementById('search-input').value.toLowerCase().trim();

  const fromDate = from ? new Date(from) : null;
  const toDate   = to   ? new Date(to)   : null;

  const filtered = allEvents.filter(ev => {
    const evDate = parseGermanDate(ev.Date_Start);

    if (fromDate && evDate && evDate < fromDate) return false;
    if (toDate   && evDate && evDate > toDate)   return false;

    if (age && (ev.age_group || '') !== age) return false;
    if (venue && decodeHtml(ev.Venue) !== venue) return false;
    if (cat && !ev.Categories.includes(cat)) return false;

    if (search) {
      const haystack = [ev.Title, ev.Subtitle, ev.Venue, ev.Categories, ev.Course_Nr].join(' ').toLowerCase();
      if (!haystack.includes(search)) return false;
    }

    return true;
  });

  renderEvents(filtered);
}

// ── Modal ──────────────────────────────────────────────────
function openModal(ev, detailFile) {
  const overlay = document.getElementById('modal-overlay');
  document.getElementById('modal-title').textContent    = decodeHtml(ev.Title);
  document.getElementById('modal-subtitle').textContent = decodeHtml(ev.Subtitle || '');
  document.getElementById('modal-link').href            = ev.Link || '#';

  const cats = (ev.Categories || '').split(',').map(c => decodeHtml(c.trim()));
  const ageTag = extractAgeTag(ev);
  document.getElementById('modal-meta').innerHTML = `
    ${ageTag ? `<span class="tag age">${ageTag}</span>` : ''}
    <span class="tag">🗓️ ${formatDate(ev.Date_Start)}</span>
    ${ev.Time ? `<span class="tag">⏰ ${ev.Time}</span>` : ''}
    <span class="tag venue">📍 ${decodeHtml(ev.Venue)}</span>
    <span class="tag">🏷️ ${decodeHtml(ev.Price)}</span>
  `;

  const detailEl = document.getElementById('modal-detail');
  detailEl.textContent = 'Lade Details...';

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  fetch(detailFile)
    .then(r => r.ok ? r.text() : Promise.reject(r.status))
    .then(text => {
      const parts = text.split(/={10,}/);
      const body = (parts[1] || parts[0]).trim();
      detailEl.textContent = body;
    })
    .catch(() => {
      detailEl.textContent = 'Details konnten nicht geladen werden.';
    });
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-close').addEventListener('click', e => {
  e.stopPropagation();
  closeModal();
});
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Populate dropdowns ─────────────────────────────────────
function populateDropdowns() {
  const venues = [...new Set(allEvents.map(e => decodeHtml(e.Venue)))].sort();
  const venSel = document.getElementById('filter-venue');
  venues.forEach(v => {
    const o = document.createElement('option');
    o.value = v; o.textContent = v;
    venSel.appendChild(o);
  });

  const excluded = ['Jahre','Erwachsene','Workshops_','alle Ferien'];
  const cats = [...new Set(
    allEvents.flatMap(e =>
      e.Categories.split(',')
        .map(c => decodeHtml(c.trim()))
        .filter(c => c && !excluded.some(x => c.includes(x)))
    )
  )].sort();

  const catSel = document.getElementById('filter-category');
  cats.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    catSel.appendChild(o);
  });
}

// ── Init ───────────────────────────────────────────────────
document.getElementById('btn-reset').addEventListener('click', () => {
  document.getElementById('filter-date-from').value = '';
  document.getElementById('filter-date-to').value   = '';
  document.getElementById('filter-age').value       = '';
  document.getElementById('filter-venue').value     = '';
  document.getElementById('filter-category').value  = '';
  document.getElementById('search-input').value     = '';
  renderEvents(allEvents);
});

['filter-date-from','filter-date-to','filter-age','filter-venue','filter-category'].forEach(id => {
  document.getElementById(id).addEventListener('change', applyFilters);
});
document.getElementById('search-input').addEventListener('input', applyFilters);

Papa.parse('manifest.csv', {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete(results) {
    document.getElementById('loading').style.display = 'none';
    allEvents = results.data;
    populateDropdowns();
    renderEvents(allEvents);
  },
  error(err) {
    document.getElementById('loading').innerHTML =
      '<p style="color:var(--secondary)">Fehler beim Laden: ' + err.message + '</p>';
  }
});
</script>
</body>
</html>
